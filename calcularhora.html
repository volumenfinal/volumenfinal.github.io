<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiempo Toatl</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            min-height: 100vh;
            background-color: black; /* Color de fondo */
        }

        h1 {
            margin-top: 20px;
            font-size: 2em;
            color: white;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            background-color: gray; /* Fondo blanco del contenedor */
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .output {
            margin-top: 15px;
            padding: 10px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        footer {
            padding: 10px;
            width: 100%;
            text-align: center;
            background-color: gray;
            position: relative;
            bottom: 0;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <h1>Tiempo Total 👻</h1>
    <div class="container">
        <div class="form-group">
            <label for="abbreviation">Sabor:</label>
            <input type="text" id="abbreviation" placeholder="Ingresa el Sabor">
            <div id="message" class="output"></div>
        </div>

        <div class="form-group">
            <label for="start-time">Hora inicial:</label>
            <input type="time" id="start-time">
        </div>

        <div class="form-group">
            <label for="end-time">Hora final:</label>
            <input type="time" id="end-time">
        </div>

        <div id="time-difference" class="output">Horas Total: 0</div>
    </div>

    <footer>
        Sitio web hecho por Adonay 👻
    </footer>

    <script>
        const abbreviationMessages = {
            "CCF": "Lleva 1 hora de reposo 👻",
            "CC": "Lleva 30 minutos (0.5) de reposo 👻",
            "FNH": "Lleva 1 hora de reposo 👻",
            "CCZ": "Lleva 30 minutos (0.5) de reposo 👻",
            "CCZB": "Lleva 30 minutos (0.5) de reposo 👻",
            "FRKH": "Lleva 1 hora de reposo 👻",
            "KL": "Lleva 1 hora de reposo 👻",
            "UVAH": "Lleva 1 hora de reposo 👻",
            "CSH": "Lleva 1 hora de reposo 👻",
            "FSAH": "Lleva 1 hora de reposo 👻",
            "FTM": "Lleva 1 hora de reposo 👻",
            "FTL": "Lleva 1 hora de reposo 👻",
            "FTLB": "Lleva 1 hora de reposo 👻",
            "JDVM": "No lleva reposo 👻",
            "JDVC": "Lleva 1 hora de reposo 👻",
            "JDVG": "Lleva 1 hora de reposo 👻",
            "PFI4": "No lleva reposo 👻",
            "PNI4": "No lleva reposo 👻",
            "PMB": "No lleva reposo 👻",
            "FURYG": "No Lleva reposo 👻",
            "FURYM": "No lleva reposo 👻",
            "SWMZ": "Lleva 1 hora de reposo 👻",
            "SWMA": "Lleva 1 hora de reposo 👻",
        };

        document.getElementById('abbreviation').addEventListener('input', function() {
            const abbreviation = this.value.trim().toUpperCase();
            const message = abbreviationMessages[abbreviation] || "Abreviatura no reconocida";
            document.getElementById('message').textContent = message;
        });

        function calculateTimeDifference() {
            const startTime = document.getElementById('start-time').value;
            const endTime = document.getElementById('end-time').value;

            if (startTime && endTime) {
                const start = new Date(`1970-01-01T${startTime}Z`);
                const end = new Date(`1970-01-01T${endTime}Z`);
                let difference = (end - start) / (1000 * 60 * 60);

                if (difference < 0) {
                    difference += 24; // Manejar diferencias negativas para horas cruzadas.
                }

                document.getElementById('time-difference').textContent = `Hora Total: ${difference.toFixed(2)}`;
            } else {
                document.getElementById('time-difference').textContent = 'Hora Total: 0';
            }
        }

        document.getElementById('start-time').addEventListener('input', calculateTimeDifference);
        document.getElementById('end-time').addEventListener('input', calculateTimeDifference);
    </script>
</body>
</html>
